<div class="flex flex-col gap-2 h-80">
    <p-scrollpanel styleClass="flex-1 w-full" [style]="{'height': '220px'}">
        @if (loading()) {
            <div class="text-center text-sm text-gray-400 py-4">Cargando mensajes...</div>
        }
        @for (msg of messages(); track msg.id) {
            <div class="mb-2">
                <span class="font-semibold text-sm">{{ msg.senderName }}</span>
                <span class="text-xs text-gray-400 ml-2">{{ msg.createdAt | date:'HH:mm' }}</span>
                <p class="text-sm m-0 mt-1">{{ msg.message }}</p>
            </div>
            <p-divider />
        }
        @if (messages().length === 0 && !loading()) {
            <div class="text-center text-sm text-gray-400 py-4">Sin mensajes aún.</div>
        }
    </p-scrollpanel>

    <div class="flex gap-2 mt-auto">
        <input pInputText class="flex-1 text-sm" placeholder="Escribe un mensaje..."
               [ngModel]="newMessage()" (ngModelChange)="setNewMessage($event)"
               (keydown.enter)="enviar()" />
        <p-button icon="pi pi-send" (onClick)="enviar()" [disabled]="!newMessage().trim()" />
    </div>
</div>
