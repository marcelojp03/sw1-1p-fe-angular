<div class="grid grid-cols-12 gap-8">
    <div class="col-span-12 flex items-center justify-between">
        <h5 class="m-0 text-xl font-semibold">Panel de Administración</h5>
    </div>

    <div class="col-span-12">
        <p-card header="Accesos rápidos">
            <div class="flex flex-wrap gap-3">
                <p-button label="Organización" icon="pi pi-building" (onClick)="router.navigate(['/admin/organizacion'])" />
                <p-button label="Usuarios" icon="pi pi-users" severity="secondary" (onClick)="router.navigate(['/admin/usuarios'])" />
                <p-button label="Políticas" icon="pi pi-sitemap" severity="info" (onClick)="router.navigate(['/admin/politicas'])" />
                <p-button label="Monitoreo" icon="pi pi-chart-bar" severity="warn" (onClick)="router.navigate(['/admin/monitoreo'])" />
            </div>
        </p-card>
    </div>
</div>
