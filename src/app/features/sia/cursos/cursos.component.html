<p-toast />
<p-confirmDialog />

<div class="card">
    <div class="flex items-center justify-between mb-6">
        <div>
            <h3 class="text-xl font-semibold text-surface-900 dark:text-surface-0 m-0">Cursos</h3>
            <p class="text-surface-400 text-sm mt-1 mb-0">Gestiona los cursos y niveles de la institución</p>
        </div>
        <p-button label="Nuevo Curso" icon="pi pi-plus" (onClick)="nuevo()" />
    </div>

    <p-table #dt [value]="cursos()" [loading]="loading" dataKey="id"
        [globalFilterFields]="['codigo','nombre','nivel','estado']"
        [paginator]="true" [rows]="10" [rowsPerPageOptions]="[10,25,50]"
        sortField="nombre" [sortOrder]="1"
        styleClass="p-datatable-striped">

        <ng-template #caption>
            <p-iconfield>
                <p-inputicon class="pi pi-search" />
                <input pInputText type="text" placeholder="Buscar curso..." (input)="onGlobalFilter(dt, $event)" />
            </p-iconfield>
        </ng-template>

        <ng-template #header>
            <tr>
                <th pSortableColumn="nombre">Nombre <p-sortIcon field="nombre" /></th>
                <th pSortableColumn="nivel">Nivel <p-sortIcon field="nivel" /></th>
                <th pSortableColumn="codigo">Código <p-sortIcon field="codigo" /></th>
                <th pSortableColumn="estado">Estado <p-sortIcon field="estado" /></th>
                <th class="w-28">Acciones</th>
            </tr>
        </ng-template>

        <ng-template #body let-c>
            <tr>
                <td class="font-medium">{{ c.nombre }}</td>
                <td>{{ c.nivel ?? '—' }}</td>
                <td><span class="font-mono text-sm bg-surface-100 dark:bg-surface-800 px-2 py-1 rounded">{{ c.codigo }}</span></td>
                <td>
                    <p-tag [value]="c.estado"
                        [severity]="c.estado === 'ACTIVO' ? 'success' : 'danger'" />
                </td>
                <td>
                    <div class="flex gap-2">
                        <p-button icon="pi pi-pencil" [rounded]="true" [text]="true" severity="info"
                            pTooltip="Editar" tooltipPosition="top" (onClick)="editar(c)" />
                        <p-button icon="pi pi-trash" [rounded]="true" [text]="true" severity="danger"
                            pTooltip="Eliminar" tooltipPosition="top" (onClick)="confirmarEliminar(c)" />
                    </div>
                </td>
            </tr>
        </ng-template>

        <ng-template #emptymessage>
            <tr><td colspan="5" class="text-center py-8 text-surface-400">No hay cursos registrados</td></tr>
        </ng-template>
    </p-table>
</div>

<p-dialog [(visible)]="dialogVisible"
    [header]="editMode ? 'Editar Curso' : 'Nuevo Curso'"
    [modal]="true" [style]="{width: '480px'}" [draggable]="false">

    <div class="flex flex-col gap-4 pt-2">
        <div class="flex flex-col gap-1">
            <label class="font-medium text-sm">Código <span class="text-red-500">*</span></label>
            <input pInputText [(ngModel)]="form.codigo" placeholder="Ej: 1SEC" />
        </div>
        <div class="flex flex-col gap-1">
            <label class="font-medium text-sm">Nombre <span class="text-red-500">*</span></label>
            <input pInputText [(ngModel)]="form.nombre" placeholder="Ej: Primero de Secundaria" />
        </div>
        <div class="flex flex-col gap-1">
            <label class="font-medium text-sm">Nivel</label>
            <input pInputText [(ngModel)]="form.nivel" placeholder="Ej: Secundaria, Primaria..." />
        </div>
    </div>

    <ng-template #footer>
        <p-button label="Cancelar" icon="pi pi-times" [text]="true" severity="secondary" (onClick)="dialogVisible = false" />
        <p-button [label]="editMode ? 'Actualizar' : 'Guardar'" icon="pi pi-check" (onClick)="guardar()" />
    </ng-template>
</p-dialog>
