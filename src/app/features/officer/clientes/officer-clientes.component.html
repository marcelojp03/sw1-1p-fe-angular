<p-toast />
<p-confirmDialog />

<div class="card">
    <div class="flex items-center justify-between mb-6">
        <div>
            <h3 class="text-xl font-semibold text-surface-900 dark:text-surface-0 m-0">Clientes</h3>
            <p class="text-surface-400 text-sm mt-1 mb-0">Gestiona los clientes de tu organización</p>
        </div>
        <p-button label="Nuevo Cliente" icon="pi pi-plus" (onClick)="nuevo()" />
    </div>

    <p-table #dt [value]="clientes()" [loading]="loading" dataKey="id"
        [globalFilterFields]="['fullName','documentNumber','email','phone']"
        [paginator]="true" [rows]="10" [rowsPerPageOptions]="[10,25,50]"
        styleClass="p-datatable-striped">

        <ng-template #caption>
            <p-iconfield>
                <p-inputicon class="pi pi-search" />
                <input pInputText type="text" (input)="dt.filterGlobal($any($event.target).value,'contains')" placeholder="Buscar..." />
            </p-iconfield>
        </ng-template>

        <ng-template #header>
            <tr>
                <th pSortableColumn="fullName">Nombre <p-sortIcon field="fullName"/></th>
                <th>Tipo Doc.</th>
                <th>N° Documento</th>
                <th>Teléfono</th>
                <th>Email</th>
                <th style="width:100px">Acciones</th>
            </tr>
        </ng-template>

        <ng-template #body let-c>
            <tr>
                <td>{{ c.fullName }}</td>
                <td>{{ c.documentType }}</td>
                <td>{{ c.documentNumber }}</td>
                <td>{{ c.phone || '—' }}</td>
                <td>{{ c.email || '—' }}</td>
                <td>
                    <p-button icon="pi pi-pencil" size="small" severity="secondary" [rounded]="true" [text]="true" (onClick)="editar(c)" />
                </td>
            </tr>
        </ng-template>

        <ng-template #empty>
            <tr><td colspan="6" class="text-center text-surface-400 py-4">No se encontraron clientes</td></tr>
        </ng-template>
    </p-table>
</div>

<!-- Dialog -->
<p-dialog [(visible)]="dialogVisible" [header]="editMode ? 'Editar Cliente' : 'Nuevo Cliente'" [modal]="true" [style]="{width:'480px'}">
    <div class="flex flex-col gap-4 py-2">
        <div class="flex flex-col gap-2">
            <label class="font-medium">Nombre completo *</label>
            <input pInputText [(ngModel)]="form.fullName" />
        </div>
        <div class="grid grid-cols-2 gap-3">
            <div class="flex flex-col gap-2">
                <label class="font-medium">Tipo documento *</label>
                <p-select [options]="docTypes" [(ngModel)]="form.documentType" [disabled]="editMode" appendTo="body" />
            </div>
            <div class="flex flex-col gap-2">
                <label class="font-medium">N° documento *</label>
                <input pInputText [(ngModel)]="form.documentNumber" [disabled]="editMode" />
            </div>
        </div>
        <div class="flex flex-col gap-2">
            <label class="font-medium">Teléfono</label>
            <input pInputText [(ngModel)]="form.phone" />
        </div>
        <div class="flex flex-col gap-2">
            <label class="font-medium">Email</label>
            <input pInputText [(ngModel)]="form.email" type="email" />
        </div>
        <div class="flex flex-col gap-2">
            <label class="font-medium">Dirección</label>
            <input pInputText [(ngModel)]="form.address" />
        </div>
    </div>
    <ng-template #footer>
        <p-button label="Cancelar" icon="pi pi-times" severity="secondary" (onClick)="dialogVisible=false" />
        <p-button label="Guardar" icon="pi pi-save" [loading]="saving" [disabled]="!form.fullName || !form.documentNumber" (onClick)="guardar()" />
    </ng-template>
</p-dialog>
