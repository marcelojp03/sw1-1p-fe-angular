<p-toast />

<div class="card">
    <div class="flex items-center justify-between mb-6">
        <div>
            <h3 class="text-xl font-semibold text-surface-900 dark:text-surface-0 m-0">Trámites</h3>
            <p class="text-surface-400 text-sm mt-1 mb-0">Listado de trámites de tu organización</p>
        </div>
        <p-button label="Iniciar Trámite" icon="pi pi-plus" (onClick)="abrirDialog()" />
    </div>

    <p-table #dt [value]="tramites()" [loading]="loading" dataKey="id"
        [globalFilterFields]="['code','policyName','status']"
        [paginator]="true" [rows]="10" [rowsPerPageOptions]="[10,25,50]"
        styleClass="p-datatable-striped">

        <ng-template #caption>
            <p-iconfield>
                <p-inputicon class="pi pi-search" />
                <input pInputText type="text" (input)="dt.filterGlobal($any($event.target).value,'contains')" placeholder="Buscar..." />
            </p-iconfield>
        </ng-template>

        <ng-template #header>
            <tr>
                <th pSortableColumn="code">Código <p-sortIcon field="code"/></th>
                <th>Política</th>
                <th>Estado</th>
                <th pSortableColumn="createdAt">Fecha <p-sortIcon field="createdAt"/></th>
                <th style="width:80px">Detalle</th>
            </tr>
        </ng-template>

        <ng-template #body let-t>
            <tr>
                <td><code>{{ t.code }}</code></td>
                <td>{{ t.policyName }}</td>
                <td><p-tag [value]="statusLabel(t.status)" [severity]="statusSeverity(t.status)" /></td>
                <td>{{ t.createdAt | date:'dd/MM/yyyy HH:mm' }}</td>
                <td>
                    <p-button icon="pi pi-eye" severity="secondary" [text]="true" size="small"
                        [routerLink]="[t.id]" />
                </td>
            </tr>
        </ng-template>

        <ng-template #empty>
            <tr><td colspan="5" class="text-center text-surface-400 py-4">No hay trámites registrados</td></tr>
        </ng-template>
    </p-table>
</div>

<p-dialog header="Iniciar Trámite" [(visible)]="dialogVisible" [modal]="true" [style]="{width:'480px'}" [draggable]="false">
    <div class="flex flex-col gap-5 pt-2">
        <div class="flex flex-col gap-2">
            <label class="font-medium">Política de workflow *</label>
            <p-select
                [options]="policies()"
                [(ngModel)]="selectedPolicyId"
                optionLabel="name"
                optionValue="id"
                placeholder="Selecciona una política"
                [loading]="loadingPolicies"
                [filter]="true"
                filterBy="name"
                appendTo="body"
                class="w-full" />
        </div>
        <div class="flex flex-col gap-2">
            <label class="font-medium">Cliente *</label>
            <p-select
                [options]="clients()"
                [(ngModel)]="selectedClientId"
                optionLabel="fullName"
                optionValue="id"
                placeholder="Selecciona un cliente"
                [loading]="loadingClients"
                [filter]="true"
                filterBy="fullName"
                appendTo="body"
                class="w-full" />
        </div>
    </div>
    <ng-template #footer>
        <p-button label="Cancelar" icon="pi pi-times" severity="secondary" (onClick)="dialogVisible=false" />
        <p-button label="Iniciar" icon="pi pi-play" [loading]="saving" [disabled]="!canSubmit" (onClick)="iniciar()" />
    </ng-template>
</p-dialog>
